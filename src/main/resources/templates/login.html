<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — SkillConnect Portal</title>
    <meta name="description" content="Login to SkillConnect and discover jobs matched to your skills.">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-page">
    <div class="auth-card fade-in">
        <!-- Logo -->
        <div class="auth-logo">
            <div style="font-size:2.5rem; margin-bottom:8px;">⚡</div>
            <div class="auth-title">SkillConnect</div>
            <div class="auth-subtitle">Sign in to your account</div>
        </div>

        <!-- Flash messages -->
        <div class="alert alert-success" th:if="${successMsg != null}">
            ✅ <span th:text="${successMsg}"></span>
        </div>
        <div class="alert alert-error" th:if="${errorMsg != null}">
            ❌ <span th:text="${errorMsg}"></span>
        </div>
        <div class="alert alert-info" th:if="${infoMsg != null}">
            ℹ️ <span th:text="${infoMsg}"></span>
        </div>

        <!-- Login Form -->
        <form id="loginForm" th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email"
                       class="form-control"
                       placeholder="you@example.com"
                       autocomplete="email" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password"
                       class="form-control"
                       placeholder="••••••••"
                       autocomplete="current-password" required>
            </div>

            <button type="submit" id="loginBtn" class="btn btn-primary btn-full btn-lg" style="margin-top:8px;">
                Sign In →
            </button>
        </form>

        <div class="divider">or</div>

        <!-- Demo credentials hint -->
        <div style="background: rgba(79,142,247,0.07); border: 1px solid rgba(79,142,247,0.2);
                    border-radius: 12px; padding: 14px; font-size: 0.8rem; color: var(--text-secondary);">
            <div style="font-weight:600; color: var(--accent-blue); margin-bottom:8px;">🔑 Demo Credentials</div>
            <div><strong>Admin:</strong> admin@portal.com / admin123</div>
            <div><strong>Seeker:</strong> arjun@seekers.com / pass123</div>
            <div><strong>Employer:</strong> hr@technova.com / pass123</div>
        </div>

        <p style="text-align:center; margin-top:20px; font-size:0.875rem; color:var(--text-muted);">
            Don't have an account?
            <a th:href="@{/register}" style="color:var(--accent-blue); text-decoration:none; font-weight:500;">
                Register here
            </a>
        </p>
    </div>
</div>
</body>
</html>
