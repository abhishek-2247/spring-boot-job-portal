<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — SkillConnect Portal</title>
    <meta name="description" content="Create your SkillConnect account as a Job Seeker or Employer.">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-page" style="align-items:flex-start; padding-top:40px;">
    <div class="auth-card fade-in" style="max-width:520px;">
        <div class="auth-logo">
            <div style="font-size:2rem; margin-bottom:8px;">⚡</div>
            <div class="auth-title">Create Account</div>
            <div class="auth-subtitle">Join thousands finding their perfect match</div>
        </div>

        <!-- Error message -->
        <div class="alert alert-error" th:if="${errorMsg != null}">
            ❌ <span th:text="${errorMsg}"></span>
        </div>

        <form id="registerForm" th:action="@{/register}" method="post" th:object="${registrationForm}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <!-- Role Selection -->
            <div class="form-group">
                <label class="form-label">I am a...</label>
                <div class="role-selector">
                    <label class="role-option" id="seekerOption" onclick="selectRole('SEEKER', this)">
                        <input type="radio" th:field="*{role}" value="SEEKER" id="roleSeeker">
                        <span class="role-icon">🎯</span>
                        <span class="role-label">Job Seeker</span>
                        <span style="font-size:0.7rem; color:var(--text-muted);">Find & apply to jobs</span>
                    </label>
                    <label class="role-option" id="employerOption" onclick="selectRole('EMPLOYER', this)">
                        <input type="radio" th:field="*{role}" value="EMPLOYER" id="roleEmployer">
                        <span class="role-icon">🏢</span>
                        <span class="role-label">Employer</span>
                        <span style="font-size:0.7rem; color:var(--text-muted);">Post jobs & hire</span>
                    </label>
                </div>
                <div class="form-error" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></div>
            </div>

            <!-- Name & Email -->
            <div class="grid-2">
                <div class="form-group">
                    <label class="form-label" for="regName">Full Name</label>
                    <input type="text" id="regName" th:field="*{name}" class="form-control" placeholder="Arjun Sharma">
                    <div class="form-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="regLocation">Location</label>
                    <input type="text" id="regLocation" th:field="*{location}" class="form-control" placeholder="Bangalore">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="regEmail">Email Address</label>
                <input type="email" id="regEmail" th:field="*{email}" class="form-control" placeholder="you@example.com" required>
                <div class="form-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label class="form-label" for="regPass">Password</label>
                    <input type="password" id="regPass" th:field="*{password}" class="form-control" placeholder="Min 6 chars">
                    <div class="form-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="regConfirm">Confirm Password</label>
                    <input type="password" id="regConfirm" th:field="*{confirmPassword}" class="form-control" placeholder="Repeat password">
                </div>
            </div>

            <!-- Employer extra fields (hidden by default) -->
            <div id="employerFields" style="display:none;">
                <div class="form-group">
                    <label class="form-label" for="companyName">Company Name</label>
                    <input type="text" id="companyName" th:field="*{companyName}" class="form-control" placeholder="TechNova Solutions">
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label" for="industry">Industry</label>
                        <input type="text" id="industry" th:field="*{industry}" class="form-control" placeholder="Software">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="website">Website</label>
                        <input type="url" id="website" th:field="*{website}" class="form-control" placeholder="https://...">
                    </div>
                </div>
            </div>

            <button type="submit" id="registerBtn" class="btn btn-primary btn-full btn-lg" style="margin-top:8px;">
                Create Account →
            </button>
        </form>

        <p style="text-align:center; margin-top:20px; font-size:0.875rem; color:var(--text-muted);">
            Already have an account?
            <a th:href="@{/login}" style="color:var(--accent-blue); text-decoration:none; font-weight:500;">Sign in</a>
        </p>
    </div>
</div>

<script>
function selectRole(role, element) {
    document.querySelectorAll('.role-option').forEach(el => el.classList.remove('selected'));
    element.classList.add('selected');
    document.getElementById('employerFields').style.display = (role === 'EMPLOYER') ? 'block' : 'none';
}
// Pre-select if form was re-submitted with errors
window.addEventListener('DOMContentLoaded', function() {
    const checkedRadio = document.querySelector('input[name="role"]:checked');
    if (checkedRadio) {
        const label = checkedRadio.closest('.role-option');
        if (label) {
            label.classList.add('selected');
            if (checkedRadio.value === 'EMPLOYER') {
                document.getElementById('employerFields').style.display = 'block';
            }
        }
    }
});
</script>
</body>
</html>
