# ============================================================
# Skill Development & Job Connect Portal - Application Config
# ============================================================

spring.application.name=Skill Job Portal

# ---- H2 In-Memory Database (Development) ----
# spring.datasource.url=jdbc:h2:mem:jobportal;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# ---- MySQL (Production) - uncomment & comment H2 above ----
spring.datasource.url=jdbc:mysql://localhost:3306/jobportal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=YOUR_PASSWORD_HERE

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ---- Thymeleaf ----
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ---- Server ----
server.port=8090
server.error.whitelabel.enabled=false
spring.jpa.open-in-view=false

# ---- Logging ----
logging.level.com.portal=DEBUG
logging.level.org.springframework.security=INFO

# ---- Async Executor ----
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=50
spring.task.execution.thread-name-prefix=JobAlert-
